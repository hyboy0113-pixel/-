<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 Joke 생성기</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Pretendard Variable", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #666;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .joke-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .joke-text {
            font-size: 1.2rem;
            color: #333;
            line-height: 1.8;
            font-weight: 500;
        }

        .joke-type {
            font-size: 0.85rem;
            color: #999;
            margin-top: 15px;
            font-style: italic;
        }

        .loading {
            font-size: 1.1rem;
            color: #667eea;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px 5px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .secondary-btn {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .secondary-btn:hover {
            background: #e8e8e8;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke 생성기</h1>
        <p class="subtitle">버튼을 클릭하면 랜덤 joke가 나타납니다!</p>

        <div class="joke-box" id="jokeBox">
            <p class="loading">Joke를 가져오는 중...</p>
        </div>

        <div class="button-group">
            <button onclick="getJoke()">새로운 Joke 가져오기</button>
            <button class="secondary-btn" onclick="copyJoke()">복사하기</button>
            <button class="secondary-btn" onclick="shareJoke()">공유하기</button>
        </div>

        <div class="info">
            💡 API: JokeAPI를 사용합니다 (https://jokeapi.dev)
        </div>
    </div>

    <script>
        let currentJoke = '';
        let currentType = '';

        // 페이지 로드 시 자동으로 joke 가져오기
        window.addEventListener('DOMContentLoaded', () => {
            getJoke();
        });

        // Joke 가져오기
        async function getJoke() {
            const jokeBox = document.getElementById('jokeBox');
            jokeBox.innerHTML = '<p class="loading">Joke를 가져오는 중...</p>';

            try {
                // JokeAPI에서 영어 joke 가져오기
                const response = await fetch('https://v2.jokeapi.dev/joke/Any?type=single');
                
                if (!response.ok) {
                    throw new Error('API 요청 실패');
                }

                const data = await response.json();

                // Joke 데이터 처리
                if (data.error) {
                    jokeBox.innerHTML = '<div class="error">❌ Joke를 가져올 수 없습니다. 다시 시도해주세요.</div>';
                    return;
                }

                currentJoke = data.joke || data.setup + ' ' + data.delivery;
                currentType = data.type === 'single' ? '한 줄 Joke' : '투 파트 Joke';

                jokeBox.innerHTML = `
                    <p class="joke-text">${currentJoke}</p>
                    <p class="joke-type">📂 ${currentType}</p>
                `;
            } catch (error) {
                console.error('Error:', error);
                jokeBox.innerHTML = `
                    <div class="error">
                        ❌ 오류 발생: ${error.message}
                        <br><br>
                        인터넷 연결을 확인하고 다시 시도해주세요.
                    </div>
                `;
            }
        }

        // Joke 복사하기
        function copyJoke() {
            if (!currentJoke) {
                alert('복사할 Joke가 없습니다!');
                return;
            }

            navigator.clipboard.writeText(currentJoke).then(() => {
                alert('✅ Joke가 클립보드에 복사되었습니다!');
            }).catch(err => {
                console.error('복사 실패:', err);
                alert('복사에 실패했습니다.');
            });
        }

        // Joke 공유하기
        function shareJoke() {
            if (!currentJoke) {
                alert('공유할 Joke가 없습니다!');
                return;
            }

            const text = `😂 ${currentJoke}`;
            
            // 웹 공유 API 지원 확인
            if (navigator.share) {
                navigator.share({
                    title: 'Joke 생성기',
                    text: text
                }).catch(err => console.log('공유 취소됨:', err));
            } else {
                // 공유 API 미지원 시 복사
                navigator.clipboard.writeText(text);
                alert('✅ Joke가 클립보드에 복사되었습니다!\n(공유 기능은 일부 브라우저에서만 지원됩니다)');
            }
        }
    </script>
</body>
</html>
